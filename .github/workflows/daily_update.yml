name: Daily AI Blog Update (Monetize Edition)

on:
  schedule:
    - cron: '0 0 * * *' # 毎日日本時間の朝9時に自動実行
  workflow_dispatch: # 手動で動かすボタンを表示

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 記事を書き込むための許可
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install google-generativeai google-api-python-client
          
      - name: Run AI Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python main.py
        
      - name: Commit and Push (Save All New Posts)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .  # これで新しい記事ファイルもすべて追加されます
          # 変更がある場合のみコミット（エラー防止）
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add new AI blog post with YouTube embed" && git push)
