name: Daily AI Blog Update (Monetize Edition)

on:
  schedule:
    # 日本時間 午前8時 (UTC 23:00) に実行
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動実行ボタンも残しておきます

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 書き込み権限を明示的に付与

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-generativeai google-api-python-client

      - name: Run AI Blog Script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # 更新がある場合のみコミット
          git diff --quiet && git diff --staged --quiet || git commit -m "Add daily AI blog post $(date +'%Y-%m-%d')"
          git push
