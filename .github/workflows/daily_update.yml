name: Daily AI Blog Update (Monetize Edition)

on:
  schedule:
    # 日本時間 午前8時 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # すべての履歴を取得してズレを防ぐ

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-generativeai google-api-python-client

      - name: Run AI Blog Script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 変更がある場合のみ実行
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Add daily AI blog post $(date +'%Y-%m-%d')"
            # 保存前に最新の状態を強制的に取り込んで競合を防ぐ
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi
